name: Runyan - ストーリーズ自動投稿

on:
  # schedule:

  #   - cron: '10 22 * * *'  # 07:10 JST 朝スロット

  #   - cron: '10  2 * * *'  # 11:10 JST 昼スロット

  #   - cron: '10  9 * * *'  # 18:10 JST 夕方スロット

  #   - cron: '10 13 * * *'  # 22:10 JST 深夜スロット

  workflow_dispatch:

concurrency:
  group: post-stories
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-story:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: ストーリーズを投稿
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python stories_poster.py

      - name: 投稿済みログを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories_posted_log.json || true
          git diff --staged --quiet || (git commit -m "chore: ストーリーズ投稿済みログを更新" && for i in 1 2 3; do git pull --rebase && git push && break || sleep 10; done)
