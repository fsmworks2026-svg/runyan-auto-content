name: Setup - Bot .env をダウンロード用に生成

# 新しいPCでDiscordBotを起動する際に使用する。
# このワークフローを手動実行すると .env ファイルが Artifacts に1日間保存される。
# Artifacts は管理者権限を持つユーザーのみダウンロード可能（プライベートリポジトリ）。

on:
  workflow_dispatch:

jobs:
  make-env:
    runs-on: ubuntu-latest

    steps:
      - name: .env ファイルを作成
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: |
          printf 'DISCORD_BOT_TOKEN=%s\n' "$DISCORD_BOT_TOKEN" > .env
          printf 'GITHUB_PAT=%s\n' "$GITHUB_PAT" >> .env
          printf 'DISCORD_SCENARIO_CHANNEL_ID=%s\n' "1502679588894019595" >> .env
          echo ".env を生成しました（内容はマスクされます）"

      - name: Artifacts にアップロード（24時間で自動削除）
        uses: actions/upload-artifact@v4
        with:
          name: bot-env
          path: .env
          retention-days: 1
          include-hidden-files: true
