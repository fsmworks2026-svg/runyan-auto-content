name: Runyan - Discord バックアップポーリング（1時間ごと）

# ローカルDiscordBot（discord_bot.py）が落ちているときのバックアップ。
# PC が起動していれば discord_bot.py がリアルタイムで処理するため、
# このワークフローは最大1時間後に検知するフォールバックとして動作する。
# JST 06:00〜23:00 の時間帯のみ実行してGitHub Actionsの無料枠を節約する。

on:
  schedule:
    - cron: '0 0-14 * * *'   # UTC 00-14 = JST 09:00-23:00
    - cron: '0 21-23 * * *'  # UTC 21-23 = JST 06:00-08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discord 状態を確認してワークフローを起動（バックアップ）
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_SCENARIO_CHANNEL_ID: "1502679588894019595"
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: "fsmworks2026-svg/runyan-auto-content"
        run: |
          python - <<'EOF'
          import requests
          import json
          import os
          import sys
          from pathlib import Path

          BOT_TOKEN  = os.getenv("DISCORD_BOT_TOKEN")
          CHANNEL_ID = os.getenv("DISCORD_SCENARIO_CHANNEL_ID")
          GH_PAT     = os.getenv("GITHUB_PAT")
          GH_REPO    = os.getenv("GITHUB_REPO")
          HEADERS    = {"Authorization": f"Bot {BOT_TOKEN}"}


          def notify_discord(text: str):
              """Discord チャンネルにメッセージを送信する"""
              requests.post(
                  f"https://discord.com/api/v10/channels/{CHANNEL_ID}/messages",
                  headers=HEADERS,
                  json={"content": text},
                  timeout=10,
              )

          def trigger_workflow(workflow_file: str, inputs: dict = None) -> bool:
              """GitHub Actions ワークフローを workflow_dispatch で起動する"""
              res = requests.post(
                  f"https://api.github.com/repos/{GH_REPO}/actions/workflows/{workflow_file}/dispatches",
                  headers={
                      "Authorization": f"token {GH_PAT}",
                      "Accept": "application/vnd.github.v3+json",
                  },
                  json={"ref": "master", "inputs": inputs or {}},
              )
              return res.status_code == 204


          # ══════════════════════════════════════════════════════════════════
          # Part 0: ブリーフィング未実行チェック（cron 遅延フォールバック）
          # JST 21:00 以降に翌日コンテキストが未生成なら runyan-briefing.yml を起動する
          # ══════════════════════════════════════════════════════════════════
          from datetime import datetime, timezone, timedelta, date as _date
          _JST      = timezone(timedelta(hours=9))
          _now_jst  = datetime.now(_JST)
          _tomorrow = (_date.today() + timedelta(days=1)).strftime("%Y%m%d")

          if _now_jst.hour >= 21:
              ctx_file = Path(f"daily_contexts/context_{_tomorrow}.json")
              if not ctx_file.exists():
                  print(f"⚠️ JST {_now_jst.hour}時: 翌日({_tomorrow})のコンテキスト未生成 → ブリーフィングを起動")
                  ok = trigger_workflow("runyan-briefing.yml")
                  if ok:
                      print("✅ runyan-briefing.yml を起動しました")
                      notify_discord("⏰ ブリーフィング遅延を検知 → 自動リトライ中...")
                  else:
                      print("❌ runyan-briefing.yml 起動失敗")
              else:
                  print(f"✅ 翌日コンテキスト確認済み（{_tomorrow}）")


          # ══════════════════════════════════════════════════════════════════
          # Part 1: ブリーフィング承認チェック（✅ / ❌ / 修正:）
          # discord_bot.py が処理済みなら discord_status は pending でないのでスキップされる
          # ══════════════════════════════════════════════════════════════════
          scenario_path = Path("current_scenario.json")
          if scenario_path.exists():
              scenario = json.loads(scenario_path.read_text(encoding="utf-8"))

              if scenario.get("discord_status") == "pending":
                  message_id = scenario.get("discord_message_id")

                  if message_id:
                      # ① ✅ リアクションの確認
                      reaction_res = requests.get(
                          f"https://discord.com/api/v10/channels/{CHANNEL_ID}/messages/{message_id}/reactions/%E2%9C%85",
                          headers=HEADERS,
                      )
                      if reaction_res.status_code == 200:
                          reactors = [u for u in reaction_res.json() if not u.get("bot")]
                          if reactors:
                              print(f"✅ リアクション検知（{reactors[0].get('username')}）→ コンテンツ生成を起動")
                              ok = trigger_workflow("runyan-generate.yml")
                              if ok:
                                  print("✅ runyan-generate.yml を起動しました")
                                  scenario["discord_status"] = "approved"
                                  scenario_path.write_text(
                                      json.dumps(scenario, ensure_ascii=False, indent=2), encoding="utf-8"
                                  )
                                  # 承認日付を記録（stories/feed_poster が参照する）
                                  approved_path = Path("approved_dates.json")
                                  approved = json.loads(approved_path.read_text(encoding="utf-8")) if approved_path.exists() else []
                                  briefing_date = scenario.get("briefing_date", "")
                                  if briefing_date and briefing_date not in approved:
                                      approved.append(briefing_date)
                                      approved_path.write_text(
                                          json.dumps(approved, ensure_ascii=False, indent=2), encoding="utf-8"
                                      )
                                      print(f"  承認日付を記録: {briefing_date}")
                              else:
                                  print("❌ ワークフロー起動失敗")
                                  sys.exit(1)
                          else:
                              print("✅ リアクションなし")
                      else:
                          print(f"Discord API エラー（✅）: {reaction_res.status_code}")

                      # ② ❌ リアクションの確認
                      ng_res = requests.get(
                          f"https://discord.com/api/v10/channels/{CHANNEL_ID}/messages/{message_id}/reactions/%E2%9D%8C",
                          headers=HEADERS,
                      )
                      if ng_res.status_code == 200:
                          ng_users = [u for u in ng_res.json() if not u.get("bot")]
                          if ng_users:
                              print("❌ リアクション検知 → 今日のコンテンツをスキップ")
                              scenario["discord_status"] = "skipped"
                              scenario_path.write_text(
                                  json.dumps(scenario, ensure_ascii=False, indent=2), encoding="utf-8"
                              )

                      # ③ 修正コメント（ブリーフィングへの返信）の確認
                      msgs_res = requests.get(
                          f"https://discord.com/api/v10/channels/{CHANNEL_ID}/messages"
                          f"?after={message_id}&limit=20",
                          headers=HEADERS,
                      )
                      if msgs_res.status_code == 200:
                          for msg in reversed(msgs_res.json()):
                              if msg.get("author", {}).get("bot"):
                                  continue
                              content_text = msg.get("content", "").strip()
                              if not content_text:
                                  continue
                              if content_text.startswith("修正:"):
                                  print(f"修正コメント検出: {content_text} → シナリオ再生成")
                                  ok = trigger_workflow("runyan-scenario.yml", {"theme_override": content_text})
                                  if ok:
                                      print("✅ runyan-scenario.yml を起動しました")
                                      scenario["discord_status"] = "regenerating"
                                      scenario_path.write_text(
                                          json.dumps(scenario, ensure_ascii=False, indent=2), encoding="utf-8"
                                      )
                                  else:
                                      print("❌ ワークフロー起動失敗")
                                      sys.exit(1)
                                  break
              else:
                  print(f"ブリーフィングステータス: {scenario.get('discord_status')}。スキップ。")
          else:
              print("current_scenario.json なし。スキップ。")


          # ══════════════════════════════════════════════════════════════════
          # Part 2: 「新規:」コマンドチェック
          # discord_bot.py が処理済みなら last_command_id が更新されているのでスキップされる
          # ══════════════════════════════════════════════════════════════════
          state_path = Path("last_command_id.json")
          state  = json.loads(state_path.read_text(encoding="utf-8")) if state_path.exists() else {"last_id": "0"}
          last_id = state.get("last_id", "0")

          res = requests.get(
              f"https://discord.com/api/v10/channels/{CHANNEL_ID}/messages?limit=20",
              headers=HEADERS,
          )
          if res.status_code != 200:
              print(f"Discord API エラー（メッセージ取得）: {res.status_code} {res.text}")
              sys.exit(1)

          messages = res.json()
          STORY_REDO = {"朝作り直し:": "morning", "昼作り直し:": "afternoon", "夕方作り直し:": "evening", "夜作り直し:": "night"}

          for msg in reversed(messages):
              if msg.get("author", {}).get("bot"):
                  continue
              if int(msg["id"]) <= int(last_id):
                  continue

              content = msg.get("content", "").strip().replace("：", ":")  # 全角コロンを半角に統一

              # ── 「新規:」コマンド ──
              if content.startswith("新規:"):
                  theme = content[3:].strip()
                  print(f"新規リール作成コマンドを検出: {theme}")
                  gh_res = trigger_workflow(
                      "runyan-scenario.yml",
                      {"theme_override": theme, "is_spot_reel": "true"},
                  )
                  if gh_res:
                      print(f"✅ Step1 を起動しました（テーマ: {theme}）")
                      state["last_id"] = msg["id"]
                      state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")
                  else:
                      print(f"❌ Step1 起動失敗")
                      sys.exit(1)
                  break

              # ── 「フィードに変更:」／「リールに変更:」コマンド ──
              if content.startswith("フィードに変更:") or content.startswith("リールに変更:"):
                  to_feed = content.startswith("フィードに変更:")
                  label   = "フィード" if to_feed else "リール"
                  print(f"{label}変更コマンドを検出")
                  import base64
                  # current_scenario.json を GitHub Contents API で取得・更新
                  sc_res = requests.get(
                      f"https://api.github.com/repos/{GH_REPO}/contents/current_scenario.json",
                      headers={"Authorization": f"token {GH_PAT}", "Accept": "application/vnd.github.v3+json"},
                  )
                  if sc_res.status_code == 200:
                      sc_data    = sc_res.json()
                      scenario   = json.loads(base64.b64decode(sc_data["content"]).decode("utf-8"))
                      sc_sha     = sc_data["sha"]
                      if to_feed:
                          scenario["has_reel"]  = False
                          scenario["has_feed"]  = True
                          scenario["feed_type"] = "person"
                      else:
                          scenario["has_reel"]  = True
                          scenario["has_feed"]  = False
                          scenario["feed_type"] = "none"
                      encoded = base64.b64encode(
                          json.dumps(scenario, ensure_ascii=False, indent=2).encode("utf-8")
                      ).decode("ascii")
                      put_res = requests.put(
                          f"https://api.github.com/repos/{GH_REPO}/contents/current_scenario.json",
                          headers={"Authorization": f"token {GH_PAT}", "Accept": "application/vnd.github.v3+json"},
                          json={"message": f"chore: コンテンツ形式を{label}に変更（バックアップBot）", "content": encoded, "sha": sc_sha},
                      )
                      if put_res.status_code in (200, 201):
                          print(f"✅ current_scenario.json を{label}に更新しました")
                      else:
                          print(f"❌ current_scenario.json 更新失敗: {put_res.status_code}")
                          sys.exit(1)
                  else:
                      print(f"❌ current_scenario.json 取得失敗: {sc_res.status_code}")
                      sys.exit(1)
                  gh_res = trigger_workflow("runyan-generate.yml")
                  if gh_res:
                      print(f"✅ runyan-generate.yml を起動しました")
                      state["last_id"] = msg["id"]
                      state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")
                  else:
                      print(f"❌ runyan-generate.yml 起動失敗")
                      sys.exit(1)
                  break

              # ── 「リール作り直し:」コマンド ──
              if content.startswith("リール作り直し:"):
                  hint = content[len("リール作り直し:"):].strip()
                  print(f"リール作り直しコマンドを検出" + (f": {hint}" if hint else ""))
                  notify_discord("🔄 リール画像を再生成します...")
                  gh_res = trigger_workflow("runyan-redo-reel.yml", {"override_hint": hint, "target_date": ""})
                  if gh_res:
                      print(f"✅ runyan-redo-reel.yml を起動しました")
                      state["last_id"] = msg["id"]
                      state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")
                  else:
                      notify_discord("❌ リール再生成ワークフローの起動に失敗しました")
                      print(f"❌ runyan-redo-reel.yml 起動失敗")
                      sys.exit(1)
                  break

              # ── ストーリーズ個別作り直しコマンド ──
              matched_slot = None
              matched_hint = ""
              SLOT_LABELS  = {"morning": "朝", "afternoon": "昼", "evening": "夕方", "night": "夜"}
              for prefix, slot_id in STORY_REDO.items():
                  if content.startswith(prefix):
                      matched_slot = slot_id
                      matched_hint = content[len(prefix):].strip()
                      break

              if matched_slot:
                  print(f"ストーリーズ再生成コマンドを検出: slot={matched_slot} hint={matched_hint!r}")
                  notify_discord(f"🔄 {SLOT_LABELS.get(matched_slot, matched_slot)}のストーリーズを再生成します...")
                  gh_res = trigger_workflow(
                      "runyan-redo-story.yml",
                      {"slot": matched_slot, "override_hint": matched_hint, "target_date": ""},
                  )
                  if gh_res:
                      print(f"✅ runyan-redo-story.yml を起動しました")
                      state["last_id"] = msg["id"]
                      state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")
                  else:
                      notify_discord(f"❌ ストーリーズ再生成ワークフローの起動に失敗しました")
                      print(f"❌ runyan-redo-story.yml 起動失敗")
                      sys.exit(1)
                  break

          # ══════════════════════════════════════════════════════════════════
          # Part 3: ストーリーズスロット別リアクションチェック
          # story_message_ids.json のスロット別メッセージに対して
          # ✅ → True（承認）/ ❌ → False（却下）を approved_slots.json に記録
          # ══════════════════════════════════════════════════════════════════
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          today_str = datetime.now(JST).strftime("%Y%m%d")

          ids_path   = Path("story_message_ids.json")
          slots_path = Path("approved_slots.json")

          if ids_path.exists() and slots_path.exists():
              ids_data       = json.loads(ids_path.read_text(encoding="utf-8"))
              all_slots      = json.loads(slots_path.read_text(encoding="utf-8"))
              today_ids      = ids_data.get(today_str, {})
              today_approved = all_slots.get(today_str, {})
              channel_id     = today_ids.get("channel_id") or os.getenv("DISCORD_SCENARIO_CHANNEL_ID")
              updated        = False

              for slot_id, msg_id in today_ids.items():
                  if slot_id == "channel_id":
                      continue
                  if today_approved.get(slot_id) is not None:
                      # 既に承認/却下済みはスキップ
                      continue
                  if not msg_id or not channel_id:
                      continue

                  # ✅ チェック
                  ok_res = requests.get(
                      f"https://discord.com/api/v10/channels/{channel_id}/messages/{msg_id}/reactions/%E2%9C%85",
                      headers=HEADERS,
                  )
                  if ok_res.status_code == 200:
                      reactors = [u for u in ok_res.json() if not u.get("bot")]
                      if reactors:
                          print(f"  ✅ {slot_id} 承認 ({reactors[0].get('username')})")
                          today_approved[slot_id] = True
                          updated = True
                          continue

                  # ❌ チェック
                  ng_res = requests.get(
                      f"https://discord.com/api/v10/channels/{channel_id}/messages/{msg_id}/reactions/%E2%9D%8C",
                      headers=HEADERS,
                  )
                  if ng_res.status_code == 200:
                      ng_users = [u for u in ng_res.json() if not u.get("bot")]
                      if ng_users:
                          print(f"  ❌ {slot_id} 却下")
                          today_approved[slot_id] = False
                          updated = True

              if updated:
                  all_slots[today_str] = today_approved
                  slots_path.write_text(json.dumps(all_slots, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"approved_slots.json を更新しました: {today_approved}")
              else:
                  print("ストーリーズスロット: 新しいリアクションなし")
          else:
              print("story_message_ids.json / approved_slots.json なし。スキップ。")

          # ══════════════════════════════════════════════════════════════════
          # Part 4: スポット投稿確認チェック（✅ / ❌ / 返信）
          # spot_pending.json の Discord メッセージに対してリアクション・返信を確認
          # ══════════════════════════════════════════════════════════════════
          spot_path = Path("spot_pending.json")
          if spot_path.exists():
              spot = json.loads(spot_path.read_text(encoding="utf-8"))
              if spot.get("status") == "pending":
                  spot_msg_id    = spot.get("discord_message_id")
                  spot_ch_id     = spot.get("discord_channel_id") or os.getenv("DISCORD_SCENARIO_CHANNEL_ID")
                  spot_type      = spot.get("type", "feed")
                  spot_updated   = False

                  if spot_msg_id and spot_ch_id:
                      # ✅ チェック
                      ok_res = requests.get(
                          f"https://discord.com/api/v10/channels/{spot_ch_id}/messages/{spot_msg_id}/reactions/%E2%9C%85",
                          headers=HEADERS,
                      )
                      if ok_res.status_code == 200:
                          reactors = [u for u in ok_res.json() if not u.get("bot")]
                          if reactors:
                              print(f"  ✅ スポット{spot_type} 承認 → Instagram 投稿を起動")
                              ok = trigger_workflow("runyan-spot-post.yml", {"type": spot_type})
                              if ok:
                                  spot["status"] = "approved"
                                  spot_updated = True

                      if not spot_updated:
                          # ❌ チェック
                          ng_res = requests.get(
                              f"https://discord.com/api/v10/channels/{spot_ch_id}/messages/{spot_msg_id}/reactions/%E2%9D%8C",
                              headers=HEADERS,
                          )
                          if ng_res.status_code == 200:
                              ng_users = [u for u in ng_res.json() if not u.get("bot")]
                              if ng_users:
                                  print(f"  ❌ スポット{spot_type} 却下")
                                  spot["status"] = "rejected"
                                  spot_updated = True

                      if not spot_updated:
                          # 返信（作り直し）チェック
                          msgs_res = requests.get(
                              f"https://discord.com/api/v10/channels/{spot_ch_id}/messages?after={spot_msg_id}&limit=10",
                              headers=HEADERS,
                          )
                          if msgs_res.status_code == 200:
                              for msg in reversed(msgs_res.json()):
                                  if msg.get("author", {}).get("bot"):
                                      continue
                                  ref = msg.get("message_reference", {})
                                  if ref.get("message_id") == spot_msg_id:
                                      new_desc = msg.get("content", "").strip()
                                      print(f"  作り直し指示: {new_desc[:40]}")
                                      ok = trigger_workflow(
                                          "runyan-spot-generate.yml",
                                          {"type": spot_type, "description": new_desc},
                                      )
                                      if ok:
                                          spot["status"] = "regenerating"
                                          spot_updated = True
                                      break

                  if spot_updated:
                      spot_path.write_text(json.dumps(spot, ensure_ascii=False, indent=2), encoding="utf-8")
              else:
                  print(f"スポット投稿ステータス: {spot.get('status')}。スキップ。")
          else:
              print("spot_pending.json なし。スキップ。")
          EOF

      - name: 変更ファイルを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current_scenario.json last_command_id.json || true
          [ -f approved_dates.json ] && git add approved_dates.json || true
          [ -f approved_slots.json ] && git add approved_slots.json || true
          [ -f story_message_ids.json ] && git add story_message_ids.json || true
          [ -f spot_pending.json ] && git add spot_pending.json || true
          git diff --staged --quiet || (git commit -m "chore: Discordバックアップポーリング結果を更新" && git pull --rebase && git push)
