name: Runyan - ストーリーズ生成（ブリーフィング承認後）

# briefing でリール/フィード画像を確認して Discord ✅ 後に自動起動される
# 手動実行も可能（再生成したい場合）

on:
  workflow_dispatch:

concurrency:
  group: briefing-stories
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  briefing-stories:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ストーリーズ画像を生成してDiscordに送信
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHARACTER_NAME: るーにゃ
          CHARACTER_AGE: 21
          CHARACTER_BIRTHDAY: 12月20日
        run: python main.py briefing_stories

      - name: 生成ファイルをリポジトリに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories_output/ || true
          [ -f story_message_ids.json ] && git add story_message_ids.json || true
          [ -f approved_slots.json ] && git add approved_slots.json || true
          [ -f current_scenario.json ] && git add current_scenario.json || true
          git diff --staged --quiet || (git commit -m "chore: ストーリーズ生成完了（承認後）" && for i in 1 2 3; do git pull --rebase && git push && break || sleep 10; done)
