name: Runyan - フィード自動投稿

on:
  schedule:
    - cron: '10  6 * * *'  # 15:10 JST  食べ物写真（13〜17時帯）
    - cron: '10 11 * * *'  # 20:10 JST  人物写真（18〜22時帯）
  workflow_dispatch:

concurrency:
  group: post-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: フィード画像を投稿
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python feed_poster.py

      - name: 投稿済みログを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed_posted_log.json || true
          git diff --staged --quiet || (git commit -m "chore: フィード投稿済みログを更新" && for i in 1 2 3; do git pull --rebase && git push && break || sleep 10; done)
