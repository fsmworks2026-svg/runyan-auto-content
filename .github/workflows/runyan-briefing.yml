name: Runyan - 前日ブリーフィング（21時）

on:
  # schedule:

  #   # UTC 6:00 = JST 15:00。GitHub Actions は約6-7時間遅延するため、遅延後 JST 21:00〜22:00 に実行される

  #   - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日付（YYYY-MM-DD、空欄で翌日自動）'
        required: false
        default: ''
      force_briefing:
        description: '既に送信済みでも Discord に再送する（true/false）'
        required: false
        default: 'false'

concurrency:
  group: briefing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 翌日のコンテキスト・シナリオ・ストーリーズを生成してDiscordに投稿
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_VIDEO_CHANNEL_ID: "1503066020745576660"
          CHARACTER_NAME: るーにゃ
          CHARACTER_AGE: 21
          CHARACTER_BIRTHDAY: 12月20日
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          FORCE_BRIEFING: ${{ github.event.inputs.force_briefing }}
        run: |
          python main.py briefing

      - name: 生成ファイルをリポジトリに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current_scenario.json || true
          git add daily_contexts/ || true
          git add stories_output/ || true
          git add feed_output/ || true
          git add video_upload_request.json || true
          [ -f theme_history.json ] && git add theme_history.json || true
          [ -f story_message_ids.json ] && git add story_message_ids.json || true
          [ -f approved_slots.json ] && git add approved_slots.json || true
          git add reel_output/ || true
          [ -f reel_message_ids.json ] && git add reel_message_ids.json || true
          git diff --staged --quiet || (git commit -m "chore: ブリーフィングを生成" && for i in 1 2 3; do git pull --rebase && git push && break || sleep 10; done)
