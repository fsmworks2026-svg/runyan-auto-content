name: Runyan - 前日ブリーフィング（21時）

on:
  schedule:
    # 毎日21時JST（UTC 12:00）に実行
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 翌日のコンテキスト・シナリオ・ストーリーズを生成してDiscordに投稿
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_VIDEO_CHANNEL_ID: "1503066020745576660"
          CHARACTER_NAME: るーにゃ
          CHARACTER_AGE: 21
          CHARACTER_BIRTHDAY: 12月20日
        run: |
          python main.py briefing

      - name: 生成ファイルをリポジトリに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current_scenario.json daily_contexts/ stories_output/ feed_output/ video_upload_request.json || true
          [ -f theme_history.json ] && git add theme_history.json || true
          git diff --staged --quiet || (git commit -m "chore: 翌日ブリーフィングを生成" && git pull --rebase && git push)
