name: Runyan Step3 - 動画投稿（Instagram リール）

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discord #video-uploads を確認してInstagramに投稿
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_VIDEO_CHANNEL_ID: "1503066020745576660"
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python video_poster.py

      - name: 処理済みIDを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_video_id.json
          git diff --staged --quiet || (git commit -m "chore: 動画投稿済みIDを更新" && git pull --rebase && git push)
