name: Runyan Step3 - 動画投稿（Instagram リール）

on:
  schedule:
    # JST 10:00-22:00 の間、1時間ごとに実行（UTC 1:00-13:00）
    - cron: '0 1-13 * * *'
  workflow_dispatch:
    inputs:
      force_post:
        description: '時間チェックをスキップして強制投稿（true/false）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  post-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discord #video-uploads を確認してInstagramに投稿
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_VIDEO_CHANNEL_ID: "1503066020745576660"
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_POST: ${{ github.event.inputs.force_post }}
        run: python video_poster.py

      - name: 処理済みIDと動画を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_video_id.json
          git diff --staged --quiet || (git commit -m "chore: 動画処理済みファイルを保存" && git pull --rebase && git push)
