name: ベース画像保護チェック

on:
  push:
    branches:
      - master

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: ベース画像への変更を検出
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD | grep "^キャラ画像/" || true)
          if [ -n "$CHANGED" ]; then
            echo "❌ キャラ画像/ フォルダのベース画像は変更禁止です"
            echo "変更されたファイル:"
            echo "$CHANGED"
            echo "誤って変更した場合は git revert で元に戻してください"
            exit 1
          else
            echo "✅ ベース画像への変更なし"
          fi
