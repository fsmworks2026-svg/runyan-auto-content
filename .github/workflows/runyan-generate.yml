name: Runyan Step2 - 画像・動画生成

on:
  workflow_dispatch:
    inputs:
      override_title:
        description: 'タイトルを変更する場合に入力（空欄でそのまま）'
        required: false
        default: ''
      override_scenario:
        description: 'シナリオ本文を変更する場合に入力（空欄でそのまま）'
        required: false
        default: ''
      override_setting:
        description: '舞台設定を変更する場合に入力（例：カフェ、大学、家）'
        required: false
        default: ''
      override_makeup:
        description: 'メイクを変更する場合に入力（gachi / natural / suppin）'
        required: false
        default: ''

jobs:
  generate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Generate image and video
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_CREDENTIALS_PATH: ./credentials.json
          CHARACTER_NAME: るーにゃ
          CHARACTER_AGE: 21
          CHARACTER_BIRTHDAY: 12月20日
          OVERRIDE_TITLE: ${{ github.event.inputs.override_title }}
          OVERRIDE_SCENARIO: ${{ github.event.inputs.override_scenario }}
          OVERRIDE_SETTING: ${{ github.event.inputs.override_setting }}
          OVERRIDE_MAKEUP: ${{ github.event.inputs.override_makeup }}
        run: |
          python main.py generate

      - name: Upload generated content
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: generated_content/
